<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Luyện thi - KTCT Mác - Lênin</title>
<link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
<link rel="stylesheet" href="../assets/style.css?1784711157">
</head>
<body>
  <div class="page-header">
  <h1>Luyện thi — <em>[KTCT Mác - Lênin]</em></h1>
  <p class="stats" id="totalCount">Tổng: <span>0 câu</span></p>
  <p class="instruction" id="mode-instruction">💡 Trắc nghiệm: Đọc → Tự nghĩ → CLICK để kiểm tra &nbsp;|&nbsp; Tự luận: Đọc → Tự viết → CLICK xem gợi ý</p>
  </div>
  <div class="mode-switch">
    <button id="btnKnowledgeMode" onclick="switchMode('knowledge')"><span class="btn-icon">🧠</span> Kiến thức nền</button>
    <button id="btnStudyMode" class="active" onclick="switchMode('study')"><span class="btn-icon">📖</span> Ngân hàng đề</button>
    <button id="btnQuizMode" onclick="switchMode('quiz')"><span class="btn-icon">🎯</span> Thi Thử</button>
    <button id="btnHistory" onclick="renderHistory()" style="background:#f39c12; color:#fff; margin-left:10px; border-left: 1px solid rgba(255,255,255,0.3);"><span class="btn-icon">📈</span> Lịch sử</button>
  </div>

  <div id="quiz-result-summary"></div>
  <div id="quiz-container">
    <div id="quiz-content"></div>
  </div>

  <div id="knowledge-container">
    <!-- NỘI DUNG KIẾN THỨC NỀN SẼ ĐƯỢC NHÚNG VÀO ĐÂY DƯỚI DẠNG ACCORDION -->
    <div id="knowledge-content"></div>
  </div>

  <div class="search-wrap">
    <input type="text" id="searchBox" placeholder="🔍 Nhập từ khóa để tìm nhanh..." oninput="filterQuestions()" />
    <button id="clearBtn" onclick="clearSearch()">✕ Xóa</button>
  </div>
  <div id="searchMeta"></div>
  <div id="noResult">Không tìm thấy câu hỏi nào phù hợp.</div>

  <div id="questions-list">
    <!-- CÁC CÂU HỎI SẼ ĐƯỢC CHÈN VÀO ĐÂY -->
  </div>

  <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
  <!-- Thư viện MathJax để hiển thị công thức toán học -->
  <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
  <script>
    const QS_DATA_URL = 'TEN_MON_HOC_qs.json';
    
    // Cấu hình riêng cho môn học này (dùng cho chế độ Luyện Cấu Trúc)
    window.subjectConfig = {
      quizTotal: 40, // Tổng số câu hỏi trong 1 đề thi
      structure: [
        // Mở comment và sửa lại theo cấu trúc đề thi thực tế. Nếu bỏ trống, hệ thống sẽ bốc ngẫu nhiên.
        // { tag: "Chương 1", count: 10 },
        // { tag: "Chương 2", count: 15 },
        // { tag: "Bài tập", count: 15 }
      ]
    };
  </script>
  <script src="../assets/app.js?1784711157"></script>

  <!-- MODAL LỊCH SỬ -->
  <div id="history-modal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 9999; align-items: center; justify-content: center; backdrop-filter: blur(3px);">
    <div style="background: #fff; width: 90%; max-width: 400px; padding: 20px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); position: relative;">
      <button onclick="closeHistory()" style="position: absolute; top: 15px; right: 15px; background: none; border: none; font-size: 1.5rem; cursor: pointer; color: #888;">&times;</button>
      <div id="history-content"></div>
    </div>
  </div>

</body>
</html>
