<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Luyện thi - Thống kê ứng dụng trong kinh doanh</title>



<!-- MathJax for rendering math formulas -->
  
  <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
<link rel="stylesheet" href="../assets/style.css?v=1784288768">
</head>
<body>
  <div class="page-header">
    <h1>Luyện thi — <em>Thống kê ứng dụng trong kinh doanh</em></h1>
    <span class="stats" id="totalCount"><b>0</b> câu</span>
    <p class="instruction" id="mode-instruction">💡 Trắc nghiệm: Đọc → Tự nghĩ → CLICK để kiểm tra &nbsp;|&nbsp; Tự luận: Đọc → Tự viết → CLICK xem gợi ý</p>
  </div>
  <div class="mode-switch">
    <button id="btnKnowledgeMode" onclick="switchMode('knowledge')"><span class="btn-icon">🧠</span> Kiến thức nền</button>
    <button id="btnStudyMode" class="active" onclick="switchMode('study')"><span class="btn-icon">📖</span> Ngân hàng đề</button>
    <button id="btnQuizMode" onclick="switchMode('quiz')"><span class="btn-icon">🎯</span> Thi Thử</button>
    <button id="btnHistory" onclick="renderHistory()" style="margin-left:10px;"><span class="btn-icon">📈</span> Lịch sử</button>
  </div>

  
  <div id="knowledge-container">
    <div class="kb-topic-card open">
      <div class="kb-topic-header" onclick="toggleKb('kb-1')">
        <div class="kb-topic-title">💡 Đang cập nhật dữ liệu...</div>
      </div>
      <div class="kb-topic-content" id="kb-1">
        <p style="padding: 15px; margin: 0; color: #666; font-size: 0.9em;">Phần Kiến thức nền cho môn này đang được hệ thống tổng hợp và sẽ sớm ra mắt.</p>
      </div>
    </div>
  </div>

  <div id="quiz-result-summary"></div>
  <div id="quiz-container">
    <div id="quiz-content"></div>
  </div>

  <div class="search-wrap">
    <input type="text" id="searchBox" placeholder="🔍 Nhập từ khóa để tìm kiếm câu hỏi..." oninput="filterQuestions()" />
    <button id="clearBtn" onclick="clearSearch()">✕ Xóa</button>
  </div>
  <div id="searchMeta"></div>
  <div id="noResult">Không tìm thấy câu hỏi nào phù hợp.</div>

  <div id="questions-list"></div>

  <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
  <!-- Thư viện MathJax để hiển thị công thức toán học -->
  <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
  <script>const QS_DATA_URL = 'Ngan_hang_de_Thong_ke_qs.json';</script>
  <script src="../assets/app.js?1784261156"></script>

  <!-- MODAL LỊCH SỬ -->
  <div id="history-modal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 9999; align-items: center; justify-content: center; backdrop-filter: blur(3px);">
    <div style="background: #fff; width: 90%; max-width: 400px; padding: 20px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); position: relative;">
      <button onclick="closeHistory()" style="position: absolute; top: 15px; right: 15px; background: none; border: none; font-size: 1.5rem; cursor: pointer; color: #888;">&times;</button>
      <div id="history-content"></div>
    </div>
  </div>

</body>
</html>
